<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>설문지</title>
    </head>
    <body>
        <header>
            <h2>설문지</h2>
            소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.
            <hr></header>
        <section>
            <form>
                학년
                <label>
                    <input type="radio" name="grade" value="1">1학년
                </label>
                <label>
                    <input type="radio" name="grade" value="2">2학년
                </label>
                <label>
                    <input type="radio" name="grade" value="3">3학년
                </label><br>
                성별
                <label>
                    <input type="radio" name="gender" value="1">남
                </label>
                <label>
                    <input type="radio" name="gender" value="2">여
                </label><br>
                관심 분야
                <select name="favorite">
                    <option value="1">게임</option>
                    <option value="2">음악</option>
                    <option value="3">운동</option>
                    <option value="4">IT</option>
                </select><br>
                진로
                <label>
                    <input type="checkbox" value="1">게임
                </label>
                <label>
                    <input type="checkbox" value="2">음악
                </label>
                <label>
                    <input type="checkbox" value="3">운동
                </label>
                <label>
                    <input type="checkbox" value="1">IT
                </label><br>
        </section>
        <footer>
                남기고싶은말<textarea cols="30" rows="10"></textarea>
            </form><br>
        Copyright 2026 by MYONGJI COLLEGE
    </body>
</html>

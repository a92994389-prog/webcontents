<!DOCTYPE html>
<html>
    <head><meta charset="utf-8">
    <title>:hover 활용</title>
    <style>
        #tt
        {
            background-image: url("media/다운로드.png");
            width: 100px;
            height: 100px;
        }
        #tt:hover{
            background-image: url("media/카드.jpg");
            width: 100px;
            height: 100px;

        }
    </style>
    </head>
    <body>
        <h3>:hover 활용</h3>
        <hr>
        <table>
            <tr>
                <td>
                    마우스를 올리면 카드의 앞면이 보인다.
                </td>
                <td id="tt">
                    
                </td>
            </tr>
        </table>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head><meta charset="utf-8">
    <title>색 테이블 만들기</title>
    <style>
        #brown{
            width: 100px;
            height: 50px;
            background-color: brown;
        }
        #deepskyblue{
            width: 100px;
            height: 50px;
            background-color: deepskyblue;
        }
        #blueviolet{
            width: 100px;
            height: 50px;
            background-color: blueviolet;
        }
        #gold{
            width: 100px;
            height: 50px;
            background-color: gold;
        }
        #darkorange{
            width: 100px;
            height: 50px;
            background-color: darkorange;
        }
        #olivedrab{
            width: 100px;
            height: 50px;
            background-color: olivedrab;
        }
    </style>
    </head>
    <body>
        <h3>색 이름과 코드</h3>
        <hr>
        <table border="1">
            <thead>
                <th>
                    이름
                </th>
                <th>
                    코드
                </th>
                <th>
                    색
                </th>
                <th>
                    이름
                </th>
                <th>
                    코드
                </th>
                <th>
                    색
                </th>
            </thead>
            <tbody>
                <tr>
                    <td>
                        Brown
                    </td>
                    <td>
                        #A52A2A
                    </td>
                    <td id="brown">
                    </td>
                    <td>
                        Deepskyblue
                    </td>
                    <td>
                        #00BFFF
                    </td>
                    <td id="deepskyblue">
                    </td>
                </tr>
                <tr>
                    <td>
                        Blueviolet
                    </td>
                    <td>
                        #8A2BE2
                    </td>
                    <td id="blueviolet">
                    </td>
                    <td>
                        Gold
                    </td>
                    <td>
                        #FFD700
                    </td>
                    <td id="gold">
                    </td>
                </tr>
                <tr>
                    <td>
                        DarkOrange
                    </td>
                    <td>
                        #FF8C00
                    </td>
                    <td id="darkorange">
                    </td>
                    <td>
                        OliveDrab
                    </td>
                    <td>
                        #6B8E23
                    </td>
                    <td id="olivedrab">
                    </td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
